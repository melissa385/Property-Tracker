@media(max-width:680px){.sidebar{position:fixed;top:calc(54px + var(--safe-top));bottom:0;left:0;z-index:90;transform:translateX(-100%);width:80vw;max-width:280px;}.sidebar.open{transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,.3);}.sidebar-overlay{display:none;position:fixed;inset:0;top:calc(54px + var(--safe-top));background:rgba(0,0,0,.4);z-index:89;}.sidebar-overlay.open{display:block;}}

.sb-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;}.sb-scroll::-webkit-scrollbar{width:3px;}.sb-scroll::-webkit-scrollbar-thumb{background:var(--forest-light);border-radius:4px;}

.sub-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
.sb-add{margin:8px 10px 12px;padding:8px;background:rgba(90,171,110,.12);border:1px dashed rgba(90,171,110,.35);border-radius:var(--r);color:var(--green-accent);font-size:.78rem;cursor:pointer;text-align:center;transition:background .13s;}.sb-add:hover{background:rgba(90,171,110,.22);}
.hamburger{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:4px;}@media(max-width:680px){.hamburger{display:flex;}}.hamburger span{width:20px;height:2px;background:var(--mint);border-radius:2px;transition:all .2s;}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px;min-width:0;}.main::-webkit-scrollbar{width:4px;}.main::-webkit-scrollbar-thumb{background:var(--parchment);border-radius:4px;}@media(max-width:680px){.main{padding:16px 14px;}}

.pg-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:10px;flex-wrap:wrap;}.pg-title{font-family:Georgia,serif;font-size:1.5rem;font-weight:bold;color:var(--forest);line-height:1.15;}.pg-sub{font-size:.8rem;color:var(--muted);margin-top:3px;}.hdr-btns{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0;}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}.stat{background:var(--white);border:1px solid var(--parchment);border-radius:var(--r);padding:10px 14px;min-width:80px;box-shadow:var(--sh);}.stat .v{font-size:1.25rem;font-weight:700;font-family:Georgia,serif;color:var(--forest);line-height:1;}.stat .l{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;}.stat.g .v{color:var(--green-bright);}.stat.gold .v{color:var(--gold);}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px;}.card{background:var(--white);border:1px solid var(--parchment);border-radius:var(--r);padding:14px;cursor:pointer;transition:box-shadow .13s,transform .1s,border-color .13s;box-shadow:var(--sh);position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;}.card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--parchment);transition:background .18s;}.card:hover,.card:active{box-shadow:var(--sh-lg);border-color:var(--mint);}.card:hover::before,.card:active::before{background:var(--green-accent);}.card.yard-card:hover::before,.card.yard-card:active::before{background:var(--gold);}.card .cn{font-weight:700;font-size:.9rem;margin-bottom:2px;}.card .cm{font-size:.74rem;color:var(--muted);margin-bottom:9px;}.card .cpll{font-size:.68rem;color:var(--slate);margin-bottom:3px;display:flex;justify-content:space-between;}
.pbar{height:4px;background:var(--parchment);border-radius:99px;overflow:hidden;}.pfill{height:100%;background:var(--green-accent);border-radius:99px;transition:width .4s;}.pfill.done{background:var(--green-bright);}
.imp-hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}.imp-hdr-row h2{font-family:Georgia,serif;font-size:1.05rem;color:var(--forest);}
.imp-card{background:var(--white);border:1px solid var(--parchment);border-radius:var(--r);margin-bottom:10px;box-shadow:var(--sh);overflow:hidden;}.imp-ch{display:flex;align-items:center;gap:9px;padding:12px 14px;cursor:pointer;border-bottom:1px solid transparent;-webkit-tap-highlight-color:transparent;}.imp-card.expanded .imp-ch{border-bottom-color:var(--parchment);}
.badge{padding:2px 8px;border-radius:99px;font-size:.63rem;font-weight:700;letter-spacing:.04em;flex-shrink:0;}.b-planned{background:#eef0fa;color:#3949ab;}.b-active{background:#fff8e8;color:#c17f00;}.b-done{background:#eaf5ec;color:#2d7d46;}.b-paused{background:#fdecea;color:#c0392b;}
.imp-title{font-weight:700;font-size:.88rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}.imp-cost{font-size:.78rem;color:var(--muted);font-family:Georgia,serif;margin-left:auto;white-space:nowrap;flex-shrink:0;}.imp-tog{font-size:.65rem;color:var(--muted);margin-left:6px;transition:transform .18s;flex-shrink:0;}.imp-card.expanded .imp-tog{transform:rotate(180deg);}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:9px;margin-bottom:14px;}.ml{font-size:.63rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:1px;}.mv{font-size:.83rem;font-weight:600;color:var(--ink);}

.tl{position:relative;padding-left:24px;}.tl::before{content:"";position:absolute;left:6px;top:8px;bottom:0;width:2px;background:var(--parchment);}.tl-entry{position:relative;margin-bottom:16px;}.tl-entry:last-child{margin-bottom:0;}.tl-dot{position:absolute;left:-20px;top:3px;width:10px;height:10px;border-radius:50%;border:2px solid var(--white);box-shadow:0 0 0 2px var(--parchment);background:var(--muted);}.tl-dot.start{background:var(--green-accent);box-shadow:0 0 0 2px #b5dfc0;}.tl-dot.done{background:var(--green-bright);box-shadow:0 0 0 2px #a5d6a7;}.tl-type{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--sage);margin-bottom:1px;}.tl-date{font-size:.67rem;color:var(--muted);margin-bottom:2px;}.tl-text{font-size:.82rem;color:var(--ink);}
.photo-section{margin-top:18px;}.photo-sec-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:8px;}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:10px;}.photo-thumb{position:relative;aspect-ratio:4/3;border-radius:6px;overflow:hidden;background:var(--parchment);cursor:pointer;box-shadow:var(--sh);}.photo-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .2s;}.photo-thumb:active img{transform:scale(1.04);}.photo-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:99px;width:20px;height:20px;font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .13s;}.photo-thumb:hover .photo-del,.photo-thumb:focus-within .photo-del{opacity:1;}.photo-caption{position:absolute;bottom:0;left:0;right:0;padding:3px 5px;background:linear-gradient(transparent,rgba(0,0,0,.6));color:#fff;font-size:.62rem;line-height:1.2;}
.upload-zone{border:2px dashed var(--parchment);border-radius:var(--r);padding:18px;text-align:center;color:var(--muted);font-size:.78rem;cursor:pointer;transition:border-color .15s,background .15s;}.upload-zone:hover,.upload-zone:active{border-color:var(--mint);background:rgba(168,213,181,.08);}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:400;align-items:center;justify-content:center;padding:12px;}.lightbox.open{display:flex;}.lightbox img{max-width:100%;max-height:90vh;border-radius:6px;}.lb-close{position:absolute;top:16px;right:18px;color:#fff;font-size:1.6rem;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.15);border-radius:50%;}
.btn{padding:7px 13px;border-radius:var(--r);font-size:.79rem;font-weight:600;cursor:pointer;border:none;transition:opacity .13s,transform .1s;display:inline-flex;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}.btn:active{transform:scale(.96);}.btn-primary{background:var(--green-bright);color:#fff;}.btn-primary:hover{opacity:.88;}.btn-ghost{background:transparent;border:1px solid var(--parchment);color:var(--slate);}.btn-ghost:hover{background:var(--parchment);}.btn-danger{background:#fdecea;color:var(--danger);border:1px solid #f5c6c2;}.btn-sm{padding:4px 9px;font-size:.72rem;}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(28,58,42,.55);z-index:200;align-items:flex-end;justify-content:center;padding:0;}.modal-ov.open{display:flex;}@media(min-width:540px){.modal-ov{align-items:center;padding:14px;}}
.modal{background:var(--white);border-radius:16px 16px 0 0;padding:22px 20px;padding-bottom:calc(22px + var(--safe-bottom));width:100%;max-width:520px;box-shadow:var(--sh-lg);animation:mUp .2s ease;max-height:92vh;overflow-y:auto;}@media(min-width:540px){.modal{border-radius:12px;padding:24px;animation:mIn .17s ease;}}@keyframes mUp{from{transform:translateY(100%)}to{transform:translateY(0)}}@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(6px)}to{opacity:1;transform:none}}
.modal h3{font-family:Georgia,serif;font-size:1rem;margin-bottom:14px;color:var(--forest);}.mfoot{display:flex;justify-content:flex-end;gap:7px;margin-top:16px;}
.fg{margin-bottom:11px;}.fl{display:block;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--slate);margin-bottom:3px;}.fi,.fsel,.fta{width:100%;padding:9px 11px;border:1px solid var(--parchment);border-radius:var(--r);font-size:.9rem;font-family:inherit;color:var(--ink);background:var(--cream);transition:border-color .13s;outline:none;-webkit-appearance:none;}.fi:focus,.fsel:focus,.fta:focus{border-color:var(--green-accent);}.fta{min-height:70px;resize:vertical;}.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px;}@media(max-width:400px){.frow{grid-template-columns:1fr;}}

<body>
<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="hamburger" id="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></div>
    <div class="brand" onclick="navHome()">&#x1F33F; Property <b>Tracker</b></div>
  </div>
  <div class="topbar-right" id="topbarRight"></div>
</div>
<div class="app-body">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <nav class="sidebar" id="sidebar">

    <div class="sb-add" onclick="openModal('addProperty')">+ Add Property</div>

  <main class="main" id="mainContent">
    <div class="signin-screen" id="signinScreen">
      <div class="signin-logo">&#x1F33F;</div>
      <div class="signin-title">Property Tracker</div>
      <div class="signin-sub">Sign in with Google to sync your data across all your devices.</div>
      <button class="google-btn" onclick="signIn()">
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
        Sign in with Google
      </button>
    </div>
  </main>
</div>
<div class="modal-ov" id="modalOv" onclick="closeMIfBg(event)"><div class="modal" id="modalBox"></div></div>
<div class="lightbox" id="lightbox" onclick="closeLightbox()"><div class="lb-close">&#x2715;</div><img id="lbImg" src="" alt=""></div>
<div class="toast" id="toast"></div>
<script src="https://accounts.google.com/gsi/client" async></script>
<script>
// CONFIG
var CLIENT_ID = '333447421312-7oet5oinel4tp8jeed3tgb4ueq1fmfvd.apps.googleusercontent.com';
var SCOPES = 'openid profile email https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/drive.file';
var DATA_FILENAME = 'property-tracker-data.json';

// AUTH STATE
var accessToken = null, tokenClient = null, userInfo = null, driveFileId = null;

// APP STATE
var state = null, view = {page:'home',pid:null,uid:null,expImp:null}, saving = false;

// BOOT
window.addEventListener('load', function() {
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(function(){});
  var stored = localStorage.getItem('pt_token');
  var expiry = localStorage.getItem('pt_token_expiry');
  if (stored && expiry && Date.now() < Number(expiry)) {
    accessToken = stored;
    loadUserInfo().then(function(){ loadFromDrive(); }).catch(function(){
      localStorage.removeItem('pt_token'); localStorage.removeItem('pt_token_expiry'); showSignIn();
    });
  }
});

function showSignIn() {
  accessToken = null;
  document.getElementById('signinScreen').style.display = 'flex';
  document.getElementById('topbarRight').innerHTML = '';
}

function signIn() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: function(resp) {
      if (resp.error) { showToast('Sign in failed: ' + (resp.error||'')); return; }
      if (!resp.access_token) { showToast('No token received'); return; }
      accessToken = resp.access_token;
      var expiry = Date.now() + (resp.expires_in || 3600) * 1000;
      localStorage.setItem('pt_token', accessToken);
      localStorage.setItem('pt_token_expiry', String(expiry));
      loadUserInfo().then(function(){ loadFromDrive(); }).catch(function(e){
        showToast('Error loading data: ' + e.message);
      });
    }
  });
  tokenClient.requestAccessToken({prompt: 'select_account'});
}

function signOut() {
  google.accounts.oauth2.revoke(accessToken, function(){});
  accessToken = null; localStorage.removeItem('pt_token'); localStorage.removeItem('pt_token_expiry');
  userInfo = null; driveFileId = null; state = null;
  showSignIn(); renderSidebar(); showToast("Signed out");
}

function loadUserInfo() {
  return fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: { 'Authorization': 'Bearer ' + accessToken }
  }).then(function(r) {
    if (!r.ok) throw new Error('auth');
    return r.json();
  }).then(function(data) {
    userInfo = data; renderTopbarUser();
  });
}

function renderTopbarUser() {
  if (!userInfo) return;
  var initials = (userInfo.given_name||'?')[0].toUpperCase();
  document.getElementById('topbarRight').innerHTML =
    '<button class="sync-btn" id="syncBtn" onclick="manualSync()"><span class="sync-icon">↻</span> Sync</button>' +
    '<div class="user-initial" onclick="if(confirm(\'Sign out?\'))signOut()">' + initials + '</div>';
}

// DRIVE
function driveReq(url, opts) {
  opts = opts || {};
  var hdrs = { 'Authorization': 'Bearer ' + accessToken };
  if (opts.headers) { for (var k in opts.headers) hdrs[k] = opts.headers[k]; }
  opts.headers = hdrs;
  return fetch(url, opts).then(function(r) {
    if (r.status === 401) { localStorage.removeItem('pt_token'); localStorage.removeItem('pt_token_expiry'); showSignIn(); throw new Error('auth'); }
    return r;
  });
}

function findOrCreateFile() {
  return driveReq('https://www.googleapis.com/drive/v3/files?q=name%3D%27' + encodeURIComponent(DATA_FILENAME) + '%27%20and%20trashed%3Dfalse&spaces=drive,appDataFolder&fields=files(id,name)')
  .then(function(r){ return r.json(); })
  .then(function(data) {
    if (data.files && data.files.length > 0) { driveFileId = data.files[0].id; return false; }
    var meta = { name: DATA_FILENAME, mimeType: 'application/json' };
    var form = new FormData();
    form.append('metadata', new Blob([JSON.stringify(meta)], {type:'application/json'}));
    form.append('file', new Blob([JSON.stringify(seed())], {type:'application/json'}));
    return driveReq('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', { method: 'POST', body: form })
      .then(function(r){ return r.json(); })
      .then(function(created){ driveFileId = created.id; return true; });
  });
}

function loadFromDrive() {
  showToast("Loading dataÃ¢ÂÂ¦", 99999);
  return findOrCreateFile().then(function(isNew) {
    if (isNew) {
      state = seed();
      return isNew;
    }
    return driveReq('https://www.googleapis.com/drive/v3/files/' + driveFileId + '?alt=media')
      .then(function(r){ return r.json(); })
      .then(function(data) {
        state = data;
        state.properties.forEach(function(p) {
          var hasYard = p.units.some(function(u){ return u.isYard; });
          if (!hasYard) p.units.push(makeYard());
          p.units.forEach(function(u) {
            if (!u.photos) u.photos = [];
            u.improvements.forEach(function(i){ if (!i.photos) i.photos = []; });
          });
        });
        return false;
      });
  }).then(function(isNew) {
    hideToast();
    document.getElementById('signinScreen').style.display = 'none';
    render();
    showToast(isNew ? "New tracker created Ã¢ÂÂ" : "Data loaded Ã¢ÂÂ");
  }).catch(function(e) {
    hideToast(); if (e.message !== 'auth') showToast('Failed to load data');
  });
}

function saveToDrive() {
  if (!driveFileId || !accessToken) return;
  saving = true; setSyncSpinner(true);
  driveReq('https://www.googleapis.com/upload/drive/v3/files/' + driveFileId + '?uploadType=media',
    { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify(state) })
  .then(function(){ setSyncSpinner(false); saving = false; })
  .catch(function(){ setSyncSpinner(false); saving = false; showToast('Save failed Ã¢ÂÂ check connection'); });
}

function manualSync() {
  showToast("SyncingÃ¢ÂÂ¦", 99999);
  loadFromDrive().then(function(){ hideToast(); showToast('Synced Ã¢ÂÂ'); });
}
function setSyncSpinner(on){ var btn=document.getElementById('syncBtn'); if(btn) btn.classList.toggle('spinning',on); }
var saveTimer=null;
function save(){ clearTimeout(saveTimer); saveTimer=setTimeout(saveToDrive,800); }

// SEED
function uid(){ return Math.random().toString(36).slice(2,10); }
function makeUnit(name,type){ return {id:uid(),name:name,type:type,improvements:[],photos:[],inspiration:[]}; }
function makeYard(){ return {id:uid(),name:'Yard',isYard:true,improvements:[],photos:[],inspiration:[]}; }
function makeProp(name,address,units){ var u=units.slice(); u.push(makeYard()); return {id:uid(),name:name,address:address,units:u}; }
function seed(){ return {properties:[
  makeProp('1021 Swanson Ln','1021 Swanson Ln, Colfax, CA',[makeUnit('Unit A','Residential'),makeUnit('Unit B','Residential')]),
  makeProp('20625 You Bet Rd','20625 You Bet Rd, Grass Valley, CA',[makeUnit('Unit A','Residential'),makeUnit('Unit B','Residential'),makeUnit('Unit C','Residential'),makeUnit('Shop','Shop / Outbuilding')]),
  makeProp('16600 Old Stagecoach Rd','16600 Old Stagecoach Rd (also 16619), Grass Valley, CA',[makeUnit('Unit A','Residential'),makeUnit('Unit B','Residential'),makeUnit('Unit C','Residential')])
]}; }

// RENDER
function render(){ renderSidebar(); renderMain(); }

function renderSidebar(){
  var el=document.getElementById('sidebarList');
  if(!state||!state.properties.length){ el.innerHTML='<div style="padding:10px 14px;font-size:.76rem;color:#718096;font-style:italic">No properties yet</div>'; return; }
  var html="";
  state.properties.forEach(function(p){
    var open=view.pid===p.id;
    html += '<div class="prop-item">';
    html += '<div class="prop-hdr ' + (open?"open active":"") + '" onclick="navProp(\'' + p.id + '\')">';
    html += '<span>&#x1F3E0;</span>';
    html += '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.8rem">' + esc(p.name) + '</span>';
    html += '<span class="dx" onclick="event.stopPropagation();delProp(\'' + p.id + '\')">&#x2715;</span>';
    html += '<span class="chev">&#x25B6;</span></div>';
    html += '<div class="sub-list ' + (open?"open":"") + '">';
    p.units.forEach(function(u){
      html += '<div class="sub-item ' + (view.uid===u.id?"active":"") + '" onclick="navUnit(\'' + p.id + '\',\'' + u.id + '\');closeSidebarMobile()">';
      html += '<span class="sub-dot"></span>';
      html += '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (u.isYard?"&#x1F33F; ":"") + esc(u.name) + '</span>';
      if(!u.isYard) html += '<span class="dx" onclick="event.stopPropagation();delUnit(\'' + p.id + '\',\'' + u.id + '\')">&#x2715;</span>';
      html += '</div>';
      html += '<div class="sub-item ' + (view.page==='inspo'&&view.uid===u.id?"active":"") + '" onclick="navInspo(\'' + p.id + '\',\'' + u.id + '\');closeSidebarMobile()" style="padding-left:40px;font-style:italic;color:var(--gold)">';
      html += '<span style="font-size:.72rem">&#x2728;</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.75rem">Inspiration</span>';
      html += '</div>';
    });
    html += '<div class="sub-item" onclick="openModal(\'addUnit\',\'' + p.id + '\')" style="color:var(--green-accent);opacity:.75"><span>+</span><span>Add Unit</span></div>';
    html += '</div></div>';
  });
  el.innerHTML = html;
}

function renderMain(){
  if(!state) return;
  var el=document.getElementById('mainContent');
  if(view.page==='home'){ el.innerHTML=renderHome(); return; }
  if(view.page==='prop'){ el.innerHTML=renderPropPage(); return; }
  if(view.page==='unit'){ el.innerHTML=renderUnitPage(); return; }
  if(view.page==='inspo'){ el.innerHTML=renderInspoPage(); return; }
}

function renderHome(){
  var tu=state.properties.reduce(function(a,p){ return a+p.units.length; },0);
  var ai=[];
  state.properties.forEach(function(p){ p.units.forEach(function(u){ u.improvements.forEach(function(i){ ai.push(i); }); }); });
  var cost=ai.reduce(function(a,i){ return a+(Number(i.cost)||0); },0);
  var active=ai.filter(function(i){ return i.status==="active"; }).length;
  var done=ai.filter(function(i){ return i.status==="done"; }).length;
  var html="";
  html += '<div class="hero"><h1>Every improvement,<br><span>documented.</span></h1><p>Track projects across all three properties.</p></div>';
  html += '<div class="stats">';
  html += '<div class="stat"><div class="v">' + state.properties.length + '</div><div class="l">Properties</div></div>';
  html += '<div class="stat"><div class="v">' + tu + '</div><div class="l">Units &amp; Yards</div></div>';
  html += '<div class="stat g"><div class="v">' + active + '</div><div class="l">Active</div></div>';
  html += '<div class="stat g"><div class="v">' + done + '</div><div class="l">Done</div></div>';
  html += '<div class="stat gold"><div class="v">$' + cost.toLocaleString() + '</div><div class="l">Invested</div></div></div>';
  html += '<div class="card-grid">';
  state.properties.forEach(function(p){
    var im=[]; p.units.forEach(function(u){ u.improvements.forEach(function(i){ im.push(i); }); });
    var d=im.filter(function(i){ return i.status==="done"; }).length;
    var pct=im.length?Math.round(d/im.length*100):0;
    var actv=im.filter(function(i){ return i.status==="active"; }).length;
    html += '<div class="card" onclick="navProp(\'' + p.id + '\')">';
    html += '<div class="cn">&#x1F3E0; ' + esc(p.name) + '</div>';
    html += '<div class="cm">' + esc(p.address) + '</div>';
    html += '<div class="cpll"><span>' + im.length + ' improvements</span><span>' + actv + ' active</span></div>';
    html += '<div class="pbar"><div class="pfill" style="width:' + pct + '%"></div></div></div>';
  });
  html += '</div>';
  return html;
}

function renderPropPage(){
  var p=state.properties.find(function(x){ return x.id===view.pid; });
  if(!p) return '<p>Not found.</p>';
  var im=[]; p.units.forEach(function(u){ u.improvements.forEach(function(i){ im.push(i); }); });
  var cost=im.reduce(function(a,i){ return a+(Number(i.cost)||0); },0);
  var units=p.units.filter(function(u){ return !u.isYard; });
  var yard=p.units.find(function(u){ return u.isYard; });
  var html="";
  html += '<div class="bc"><span class="crumb" onclick="navHome()">Home</span><span class="sep">/</span><span>' + esc(p.name) + '</span></div>';
  html += '<div class="pg-hdr"><div><div class="pg-title">&#x1F3E0; ' + esc(p.name) + '</div><div class="pg-sub">' + esc(p.address) + '</div></div>';
  html += '<div class="hdr-btns"><button class="btn btn-ghost btn-sm" onclick="openModal(\'editProp\',\'' + p.id + '\')">&#x270F;&#xFE0F; Edit</button>';
  html += '<button class="btn btn-primary btn-sm" onclick="openModal(\'addUnit\',\'' + p.id + '\')">+ Unit</button></div></div>';
  html += '<div class="stats">';
  html += '<div class="stat"><div class="v">' + units.length + '</div><div class="l">Units</div></div>';
  html += '<div class="stat g"><div class="v">' + im.filter(function(i){ return i.status==="active"; }).length + '</div><div class="l">Active</div></div>';
  html += '<div class="stat g"><div class="v">' + im.filter(function(i){ return i.status==="done"; }).length + '</div><div class="l">Done</div></div>';
  html += '<div class="stat gold"><div class="v">$' + cost.toLocaleString() + '</div><div class="l">Invested</div></div></div>';
  html += '<div class="imp-hdr-row"><h2>Units</h2></div><div class="card-grid">';
  units.forEach(function(u){
    var im2=u.improvements; var d=im2.filter(function(i){ return i.status==="done"; }).length;
    var pct=im2.length?Math.round(d/im2.length*100):0;
    html += '<div class="card" onclick="navUnit(\'' + p.id + '\',\'' + u.id + '\')">';
    html += '<div class="cn">&#x1F6AA; ' + esc(u.name) + '</div><div class="cm">' + esc(u.type) + '</div>';
    html += '<div class="cpll"><span>' + im2.length + ' projects</span><span>' + pct + '% done</span></div>';
    html += '<div class="pbar"><div class="pfill ' + (pct===100?"done":"") + '" style="width:' + pct + '%"></div></div></div>';
  });
  if(yard){
    var ypct=yard.improvements.length?Math.round(yard.improvements.filter(function(i){ return i.status==="done"; }).length/yard.improvements.length*100):0;
    html += '<div class="card yard-card" onclick="navUnit(\'' + p.id + '\',\'' + yard.id + '\')">';
    html += '<div class="cn">&#x1F33F; Yard</div><div class="cm">Grounds &amp; landscaping</div>';
    html += '<div class="cpll"><span>' + yard.improvements.length + ' projects</span><span>' + (yard.photos||[]).length + ' photos</span></div>';
    html += '<div class="pbar"><div class="pfill" style="width:' + ypct + '%"></div></div></div>';
  }
  html += '</div>';
  return html;
}

function renderUnitPage(){
  var p=state.properties.find(function(x){ return x.id===view.pid; });
  var u=p&&p.units.find(function(x){ return x.id===view.uid; });
  if(!p||!u) return '<p>Not found.</p>';
  var icon=u.isYard?'&#x1F33F;':'&#x1F6AA;';
  var totalCost=u.improvements.reduce(function(a,i){
    var lineTotal=(i.costItems||[]).reduce(function(s,li){ return s+(parseFloat(li.amount)||0); },0);
    return a+(lineTotal||(Number(i.cost)||0));
  },0);
  var photos=u.photos||[];
  var html="";
  html += '<div class="bc"><span class="crumb" onclick="navHome()">Home</span><span class="sep">/</span>';
  html += '<span class="crumb" onclick="navProp(\'' + p.id + '\')">'+esc(p.name)+'</span><span class="sep">/</span>';
  html += '<span>' + icon + ' ' + esc(u.name) + '</span></div>';
  html += '<div class="pg-hdr"><div><div class="pg-title">' + icon + ' ' + esc(u.name) + '</div>';
  html += '<div class="pg-sub">' + esc(p.name) + (!u.isYard ? ' &bull; ' + esc(u.type) : "") + '</div></div>';
  html += '<div class="hdr-btns">';
  if(!u.isYard) html += '<button class="btn btn-ghost btn-sm" onclick="openModal(\'editUnit\',\'' + p.id + '\',\'' + u.id + '\')">&#x270F;&#xFE0F; Edit</button>';
  html += '<button class="btn btn-ghost btn-sm" onclick="navInspo(\'' + p.id + '\',\'' + u.id + '\')">&#x2728; Inspiration</button>';
  html += '<button class="btn btn-primary btn-sm" onclick="openModal(\'addImp\',\'' + p.id + '\',\'' + u.id + '\')">+ Project</button></div></div>';
  html += '<div class="stats">';
  html += '<div class="stat"><div class="v">' + u.improvements.length + '</div><div class="l">Projects</div></div>';
  html += '<div class="stat g"><div class="v">' + u.improvements.filter(function(i){ return i.status==="active"; }).length + '</div><div class="l">Active</div></div>';
  html += '<div class="stat g"><div class="v">' + u.improvements.filter(function(i){ return i.status==="done"; }).length + '</div><div class="l">Done</div></div>';
  html += '<div class="stat gold"><div class="v">$' + totalCost.toLocaleString() + '</div><div class="l">Cost</div></div>';
  html += '<div class="stat"><div class="v">' + photos.length + '</div><div class="l">Photos</div></div></div>';
  html += '<div class="photo-section"><div class="photo-sec-title">&#x1F4F7; Photos';
  html += '<button class="btn btn-ghost btn-sm" onclick="document.getElementById(\'pu_'+u.id+'\').click()">+ Add</button><input type="file" id="pu_'+u.id+'" accept="image/*" multiple style="display:none" onchange="handleUnitPhoto(event,\''+p.id+'\',\''+u.id+'\')"></div>';
  if(photos.length){
    html += '<div class="photo-grid">';
    photos.forEach(function(ph,i){
      html += '<div class="photo-thumb" onclick="openLightbox(\'' + ph.data + '\')"><img src="' + ph.data + '" alt="">';
      if(ph.caption) html += '<div class="photo-caption">' + esc(ph.caption) + '</div>';
      html += '<button class="photo-del" onclick="event.stopPropagation();delUnitPhoto(\'' + p.id + '\',\'' + u.id + '\',' + i + ')">&#x2715;</button></div>';
    });
    html += '</div>';
  } else {
    html += '<label class="upload-zone" for="pu_'+u.id+'" style="cursor:pointer;display:block"><div style="font-size:1.6rem;margin-bottom:5px">&#x1F4F7;</div><div>Tap to add photos</div></label>';
  }
  html += '</div><hr class="sec-divider">';
  var doneProjs=u.improvements.filter(function(i){ return i.status==="done"; });
  var activeProjs=u.improvements.filter(function(i){ return i.status!=="done"; });
  if(doneProjs.length){
    html += '<div class="portfolio-header"><h2>&#x1F3C6; Portfolio &#x2014; Completed Projects</h2></div>';
    doneProjs.forEach(function(imp){ html += renderImpCard(p.id,u.id,imp,true); });
    html += '<hr class="sec-divider">';
  }
  html += '<div class="imp-hdr-row"><h2>' + (u.isYard?"Yard ":"") + 'Active Projects</h2></div>';
  if(!activeProjs.length && !doneProjs.length) html += '<div class="empty"><div class="ei">' + (u.isYard?"&#x1F331;":"&#x1F528;") + '</div><h3>No projects yet</h3><p>Tap &ldquo;+ Project&rdquo; to log your first improvement.</p></div>';
  else if(!activeProjs.length) html += '<div class="empty" style="padding:18px"><p style="color:var(--muted);font-style:italic">All projects complete! Tap &ldquo;+ Project&rdquo; to add more.</p></div>';
  activeProjs.forEach(function(imp){ html += renderImpCard(p.id,u.id,imp,false); });
  return html;
}
function renderImpCard(pid,uid2,imp,isPortfolio){
  var exp=view.expImp===imp.id;
  var bcMap={planned:'b-planned',active:'b-active',done:'b-done',paused:'b-paused'};
  var bc=bcMap[imp.status]||'b-planned';
  var costItems=imp.costItems||[];
  var totalCost=costItems.reduce(function(s,li){ return s+(parseFloat(li.amount)||0); },0)||(Number(imp.cost)||0);
  var cs=totalCost?'$'+totalCost.toLocaleString():'&#x2014;';
  var log=imp.log||[]; var photos=imp.photos||[];
  var html="";
  if(isPortfolio && imp.status==='done'){
    html += '<div class="portfolio-card" id="ic_' + imp.id + '">';
    html += '<div class="pf-header">';
    if(photos.length){ html += '<div class="pf-hero"><img src="' + photos[0].data + '" alt=""></div>'; }
    html += '<div class="pf-meta">';
    html += '<div class="pf-title">' + esc(imp.title) + '</div>';
    if(imp.category) html += '<div class="pf-cat">&#x1F3F7; ' + esc(imp.category) + '</div>';
    html += '<div class="pf-cost-big">$' + totalCost.toLocaleString() + '</div>';
    var dur='';
    if(imp.startDate&&imp.endDate){ dur=imp.startDate+' &rarr; '+imp.endDate; }
    else if(imp.startDate){ dur='Started '+imp.startDate; }
    if(dur) html += '<div class="pf-dates">&#x1F4C5; ' + dur + '</div>';
    if(imp.contractor) html += '<div class="pf-contractor">&#x1F528; ' + esc(imp.contractor) + '</div>';
    html += '</div></div>';
    if(imp.notes) html += '<div class="pf-notes">' + esc(imp.notes) + '</div>';
    if(costItems.length>1){

// PHOTOS
function compressImage(dataUrl,maxW,cb){
  var img=new Image();
  img.onload=function(){
    var scale=Math.min(1,maxW/img.width);
    var c=document.createElement("canvas");
    c.width=Math.round(img.width*scale); c.height=Math.round(img.height*scale);
    c.getContext("2d").drawImage(img,0,0,c.width,c.height);
    cb(c.toDataURL("image/jpeg",0.75));
  }; img.src=dataUrl;
}
function processFiles(files,cb){
  var done=0, results=[];
  Array.prototype.forEach.call(files,function(file,i){
    var r=new FileReader();
    r.onload=function(e){
      compressImage(e.target.result,1000,function(ph){
        results[i]=ph; done++;
        if(done===files.length) cb(results);
      });
    }; r.readAsDataURL(file);
  });
}

  }
  if(type==='addLog'){
    return '<h3>&#x1F4D6; Add Timeline Entry</h3><div class="frow"><div class="fg"><label class="fl">Date</label><input class="fi" id="m0" type="date" value="'+today()+'"></div><div class="fg"><label class="fl">Type</label><select class="fsel" id="m1"><option value="note">&#x1F4DD; Update</option><option value="start">&#x1F680; Start</option><option value="done">&#x2705; Completion</option></select></div></div><div class="fg"><label class="fl">Description *</label><textarea class="fta" id="m2" placeholder="What happened or was completed?"></textarea></div>' + mfoot + '<button class="btn btn-primary" onclick="subAddLog(\'' + a0 + '\',\'' + a1 + '\',\'' + a2 + '\')">Add Entry</button></div>';
  }
  return '<p>Unknown modal.</p>';
}

function v(id){ var e=document.getElementById(id); return e?e.value.trim():''; }
function today(){ return new Date().toISOString().slice(0,10); }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function subAddProp(){ var n=v('m0'); if(!n) return alert('Name required.');
  state.properties.push(makeProp(n,v('m1'),[])); save(); closeModal(); render(); }
function subEditProp(pid){ var n=v('m0'); if(!n) return alert('Name required.');
  var p=state.properties.find(function(x){ return x.id===pid; });
  p.name=n; p.address=v('m1'); save(); closeModal(); render(); }
function subAddUnit(pid){ var n=v('m0'); if(!n) return alert('Unit name required.');
  var p=state.properties.find(function(x){ return x.id===pid; });
  var yi=p.units.findIndex(function(u){ return u.isYard; });
  var nu=makeUnit(n,v('m1'));
  if(yi>=0) p.units.splice(yi,0,nu); else p.units.push(nu);
  save(); closeModal(); render(); }
function subEditUnit(pid,uid2){ var n=v('m0'); if(!n) return alert('Name required.');
  var p=state.properties.find(function(x){ return x.id===pid; });
  var u=p.units.find(function(x){ return x.id===uid2; });
  u.name=n; u.type=v('m1'); save(); closeModal(); render(); }
function subAddImp(pid,uid2){ var t=v('m0'); if(!t) return alert('Title required.');
  var p=state.properties.find(function(x){ return x.id===pid; });
  var u=p.units.find(function(x){ return x.id===uid2; });
  var costItems=getCostItems();
  u.improvements.push({id:uid(),title:t,category:v('m1'),status:v('m2'),contractor:v('m3'),startDate:v('m4'),endDate:v('m5'),notes:v('m6'),costItems:costItems,log:[],photos:[]});
  save(); closeModal(); render(); }
function subEditImp(pid,uid2,impId){ var t=v('m0'); if(!t) return alert('Title required.');
  var p=state.properties.find(function(x){ return x.id===pid; });
  var u=p.units.find(function(x){ return x.id===uid2; });
  var imp=u.improvements.find(function(x){ return x.id===impId; });
  var costItems=getCostItems();
  Object.assign(imp,{title:t,category:v('m1'),status:v('m2'),contractor:v('m3'),startDate:v('m4'),endDate:v('m5'),notes:v('m6'),costItems:costItems});
  save(); closeModal(); view.expImp=impId; render(); }
function subAddLog(pid,uid2,impId){ var t=v('m2'); if(!t) return alert('Description required.');
  var p=state.properties.find(function(x){ return x.id===pid; });
  var u=p.units.find(function(x){ return x.id===uid2; });
  var imp=u.improvements.find(function(x){ return x.id===impId; });
  if(!imp.log) imp.log=[];
  imp.log.push({id:uid(),date:v('m0')||today(),type:v('m1'),text:t});
  imp.log.sort(function(a,b){ return a.date.localeCompare(b.date); });
  save(); closeModal(); view.expImp=impId; render(); }

function subAddInspo(pid,uid2){ var t=v('m0'); if(!t) return alert('Title required.');
  var p=state.properties.find(function(x){ return x.id===pid; });
  var u=p.units.find(function(x){ return x.id===uid2; });
  if(!u.inspiration) u.inspiration=[];
  u.inspiration.push({id:uid(),title:t,tag:v('m1'),desc:v('m2'),link:v('m3')});
  save(); closeModal(); render(); }
function subEditInspo(pid,uid2,itemId){ var t=v('m0'); if(!t) return alert('Title required.');
  var p=state.properties.find(function(x){ return x.id===pid; });
  var u=p.units.find(function(x){ return x.id===uid2; });
  var item=(u.inspiration||[]).find(function(x){ return x.id===itemId; });
  Object.assign(item,{title:t,tag:v('m1'),desc:v('m2'),link:v('m3')});
  save(); closeModal(); render(); }
function delInspo(pid,uid2,itemId){ if(!confirm('Delete this inspiration idea?')) return;
  var p=state.properties.find(function(x){ return x.id===pid; });
  var u=p.units.find(function(x){ return x.id===uid2; });
  u.inspiration=(u.inspiration||[]).filter(function(x){ return x.id!==itemId; });
  save(); render(); }

// DELETE
function delProp(pid){ if(!confirm('Delete this property and everything in it?')) return;
  state.properties=state.properties.filter(function(x){ return x.id!==pid; });
  if(view.pid===pid) navHome(); save(); render(); }
function delUnit(pid,uid2){ if(!confirm('Delete this unit?')) return;
  var p=state.properties.find(function(x){ return x.id===pid; });
  p.units=p.units.filter(function(x){ return x.id!==uid2; });
  if(view.uid===uid2) navProp(pid); save(); render(); }
function delImp(pid,uid2,impId){ if(!confirm('Delete this project?')) return;
  var p=state.properties.find(function(x){ return x.id===pid; });
  var u=p.units.find(function(x){ return x.id===uid2; });
  u.improvements=u.improvements.filter(function(x){ return x.id!==impId; });
  save(); render(); }

// TOAST
var toastTimer=null;
function showToast(msg,dur){
  dur=dur||2500;
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); if(dur<99999) toastTimer=setTimeout(hideToast,dur);
}
function hideToast(){ var t=document.getElementById('toast'); t.classList.remove('show'); }

// UTILS
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
